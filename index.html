<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tino Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-screen">
        <div id="top-bar">
            <p id="top-bar-text">tino-terminal v.1.0.0</p>
            <img src="assets/terminal-widgets.png" alt="taskbar" id="widget">
        </div>
        <div id="terminal-content">
            <p class="text">initializing terminal...</p>
            <div id="input-line">
                <span id="prompt">djjtran@gmail-com:~$</span>
                <input id="terminal-input" type="text" autocomplete="off" spellcheck="false"></input>
            </div>
        </div>
    </div>  

    <script src="script.js"></script>
</body>
</html>
